[theme]
primaryColor = "#FF6B6B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true
# Annual-report PDFs can easily exceed Streamlit's 200 MB default. Raise the
# server-side cap; a reverse proxy in front of the container (nginx, ALB,
# Cloudflare, HF Spaces, etc.) may impose its own — bump that too if you see
# 413 in prod.
maxUploadSize = 1024
maxMessageSize = 1024

[browser]
gatherUsageStats = false

[runner]
magicEnabled = true
# Set explicitly: a sidebar/widget interaction during a long extraction must
# NOT interrupt and restart the in-flight script run. Default is false, but
# we pin it so future Streamlit versions or upstream toml templates can't
# silently re-enable mid-run rerunning.
fastReruns = false

