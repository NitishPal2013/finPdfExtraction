# Local dev / deployment — Streamlit UI for the POC2 pipeline.
#
# POC2 persists nothing between runs: the PDF lives in a container tempfile
# for the duration of one extraction, the Gemini cache + uploaded file are
# torn down in the `finally` block of run_extraction. No volume mounts
# required — leave the host filesystem untouched.
#
# The Gemini API key is passed through from the host .env file — do NOT
# bake it into the image.
#
# Usage:
#   docker compose up --build
#   open http://localhost:8501
services:
  app:
    build: .
    container_name: poc2-extractor
    ports:
      - "8501:8501"
    environment:
      # Picked up by POC2.gemini_client — set in .env next to this file.
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: unless-stopped
